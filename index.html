<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Coins - Adsgram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #050810; color: white; overflow: hidden; }
        
        .app-container {
            height: 100vh; width: 100%; display: flex; flex-direction: column;
            padding: 20px; background: radial-gradient(circle at top right, #1e293b, #050810);
        }

        /* Profile Header */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .avatar { width: 45px; height: 45px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .user-info h3 { font-size: 16px; margin-bottom: 2px; }
        .user-info p { font-size: 12px; color: #94a3b8; }

        /* Balance Card */
        .balance-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; text-align: center;
            margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-card p { font-size: 14px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .coin-box { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .coin-box i { font-size: 32px; color: #fbbf24; }
        .coin-box span { font-size: 48px; font-weight: 800; }

        /* Main Action Area */
        .action-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ad-button {
            width: 100%; max-width: 280px; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .ad-button:active { transform: scale(0.95); }
        .ad-button:disabled { opacity: 0.6; cursor: not-allowed; background: #334155; }

        .status-msg { margin-top: 20px; font-size: 14px; color: #94a3b8; }

        /* Footer Nav */
        .footer-nav {
            display: flex; justify-content: space-around; padding: 15px 0;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; margin-top: 20px;
        }
        .nav-item { text-align: center; color: #64748b; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: #3b82f6; }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="avatar" id="userInitial">U</div>
        <div class="user-info">
            <h3 id="userName">User</h3>
            <p>Free Account</p>
        </div>
    </div>

    <div class="balance-card">
        <p>Total Balance</p>
        <div class="coin-box">
            <i class="fa-solid fa-coins"></i>
            <span id="balance">0</span>
        </div>
    </div>

    <div class="action-area">
        <button id="showAdBtn" class="ad-button">
            <i class="fa-solid fa-circle-play"></i>
            Watch Ad & Earn
        </button>
        <p id="status" class="status-msg">Click above to earn 10 coins!</p>
    </div>

    <div class="footer-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></div>
        <div class="nav-item"><i class="fa-solid fa-users"></i><span>Friends</span></div>
        <div class="nav-item"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // User Data from Telegram
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userInitial').innerText = user.first_name.charAt(0);
    }

    // Balance Management
    let balance = parseInt(localStorage.getItem('user_balance')) || 0;
    document.getElementById('balance').innerText = balance;

    // Adsgram Setup (Your Block ID 34406)
    const AdController = window.Adsgram.init({ blockId: "34413" });

    const showAdBtn = document.getElementById('showAdBtn');
    const statusText = document.getElementById('status');
    const balanceText = document.getElementById('balance');

    showAdBtn.addEventListener('click', () => {
        showAdBtn.disabled = true;
        statusText.innerText = "Loading advertisement...";

        AdController.show().then((result) => {
            // Reward: 10 Coins
            balance += 10;
            localStorage.setItem('user_balance', balance);
            balanceText.innerText = balance;
            
            statusText.style.color = "#10b981";
            statusText.innerText = "Success! +10 Coins Added.";
            
            // Notify Bot
            tg.sendData("ad_watched_successfully");
            
            setTimeout(() => {
                showAdBtn.disabled = false;
                statusText.style.color = "#94a3b8";
                statusText.innerText = "Click again for more coins!";
            }, 3000);

        }).catch((error) => {
            statusText.style.color = "#ef4444";
            statusText.innerText = "Ad failed to load. Try again later.";
            showAdBtn.disabled = false;
        });
    });
</script>

</body>
</html>

আপনার নতুন প্রফেশনাল ইউজার ইন্টারফেস (UI) এখন সম্পূর্ণ তৈরি! এটি আপনার বটের ইউজারদের জন্য ইনকাম করা আরও সহজ এবং আনন্দদায়ক করবে। কোনো পরিবর্তন প্রয়োজন হলে জানাবেন।
